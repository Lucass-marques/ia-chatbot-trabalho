<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduChat Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: linear-gradient(135deg, #667eea, #764ba2);
  --glass: rgba(255,255,255,0.15);
  --border: rgba(255,255,255,0.25);
  --text: #ffffff;
  --dark-text: #2d3748;
  --accent: #ff7a18;
  --user: #4facfe;
  --bot: rgba(255,255,255,0.2);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  height: 100vh;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  backdrop-filter: blur(20px);
  background: var(--glass);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  color: white;
}

.sidebar-header {
  padding: 25px;
  text-align: center;
}

.logo-icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.profile-card {
  margin: 20px;
  padding: 20px;
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  text-align: center;
}

.avatar-circle {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  margin: 0 auto 10px;
  font-size: 24px;
}

.profile-name { font-weight: 600; }

.tip-box {
  margin: 20px;
  font-size: 12px;
  opacity: 0.8;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  height: 70px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 25px;
  color: white;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* MESSAGES */
.msg-row {
  display: flex;
}

.user-row { justify-content: flex-end; }
.bot-row { justify-content: flex-start; }

.msg-bubble {
  max-width: 70%;
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  backdrop-filter: blur(10px);
}

.user-row .msg-bubble {
  background: var(--user);
  color: white;
  border-bottom-right-radius: 5px;
}

.bot-row .msg-bubble {
  background: var(--bot);
  color: white;
  border: 1px solid var(--border);
  border-bottom-left-radius: 5px;
}

/* FOOTER */
.footer {
  padding: 20px;
}

.input-container {
  display: flex;
  gap: 10px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 8px;
}

input {
  flex: 1;
  border: none;
  background: transparent;
  color: white;
  padding: 10px 15px;
  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

.send-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SCROLL */
#chat::-webkit-scrollbar {
  width: 6px;
}
#chat::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-area">
      <div class="logo-icon">📚</div>
      <div>
        <h2 style="font-size: 16px;">EduChat Pro</h2>
        <p style="font-size: 11px; color: var(--muted);">v3.3 LLaMA</p>
      </div>
    </div>
  </div>

  <div class="profile-section">
    <div class="profile-card">
      <div class="avatar-circle" id="user-avatar">A</div>
      <div class="profile-name" id="display-name">Aluno</div>
      <div class="profile-tag">Educacional</div>
    </div>

    <div class="stats-list">
      <div class="stat-item"><span>Status</span><span class="status-online">● Online</span></div>
      <div class="stat-item"><span>Tipo</span><span class="stat-value">Estudante</span></div>
      <div class="stat-item"><span>Modelo</span><span class="stat-value">LLaMA 3.3</span></div>
    </div>

    <div class="tip-box">
        <b style="color: var(--accent2); display: block; margin-bottom: 5px;">💡 Dica de uso</b>
        Faça perguntas específicas sobre matérias escolares para respostas mais detalhadas e didáticas.
    </div>
  </div>
</div>

<div class="main">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="font-size: 24px;">🤖</div>
      <h3 style="font-size: 15px;">Assistente Educacional</h3>
    </div>
  </div>

  <div id="chat"></div>

  <div class="footer">
    <div class="input-container">
      <input id="pergunta" placeholder="Digite seu nome para começar..." autocomplete="off">
      <button class="send-btn" onclick="enviar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("pergunta");
const displayName = document.getElementById("display-name");

let nomeUsuario = null;
let memoria = [];

function addMsg(texto, tipo) {
  const row = document.createElement("div");
  row.className = "msg-row " + (tipo === "user" ? "user-row" : "bot-row");
  row.innerHTML = '<div class="msg-bubble">' + texto + '</div>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

window.onload = () => {
  addMsg("👋 Olá! Qual é o seu nome?", "bot");
};

async function enviar() {
  const texto = input.value.trim();
  if (!texto) return;

  addMsg(texto, "user");
  input.value = "";

  // 👤 Captura nome
  if (!nomeUsuario) {
    nomeUsuario = texto;
    displayName.innerText = nomeUsuario;
    input.placeholder = "Digite sua dúvida...";

    addMsg(`Prazer, <b>${nomeUsuario}</b>! 😊<br>Como posso te ajudar?`, "bot");
    return;
  }

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer 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",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "system",
            content: `
Você é um assistente educacional especializado em Tecnologia da Informação (TI).

🚫 REGRAS IMPORTANTES:
- Responda APENAS perguntas relacionadas a TI, como:
  programação, redes, sistemas, banco de dados, inteligência artificial, tecnologia, computação, etc.
- Se a pergunta NÃO for sobre TI, responda EXATAMENTE assim:

"❌ Este assistente está configurado para responder apenas dúvidas relacionadas à área de Tecnologia da Informação (TI)."

- NÃO tente responder assuntos fora de TI
- NÃO improvise respostas fora do escopo

📘 FORMATO DAS RESPOSTAS:
- Seja direto
- Use emojis para organizar:
📘 conceito
⚙️ características
💻 exemplos
🚀 vantagens

- Use HTML simples: <b>, <ul>, <li>, <br>
`
          },

          ...memoria.slice(-6),

          {
            role: "user",
            content: texto
          }
        ]
      })
    });

    const data = await res.json();

    let resposta = data?.choices?.[0]?.message?.content || "Sem resposta.";

    addMsg(resposta, "bot");

    memoria.push(
      { role: "user", content: texto },
      { role: "assistant", content: resposta }
    );

    memoria = memoria.slice(-10);

  } catch (erro) {
    console.error(erro);
    addMsg("❌ Erro ao conectar com IA.", "bot");
  }
}

input.addEventListener("keypress", e => {
  if (e.key === "Enter") enviar();
});
</script>
</body>
</html>
